<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stream</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/shared/base.css">
    <link rel="stylesheet" href="/static/pages/auth/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-bg"></div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="16" cy="16" r="14"/>
                        <path d="M10 16 L14 20 L22 12" stroke-width="2.5"/>
                    </svg>
                    <span>AI Stream</span>
                </div>
            </div>

            <div id="auth-loading" class="auth-panel">
                <div class="loading-spinner"></div>
            </div>

            <div id="login-form" class="auth-panel" hidden>
                <h1 class="auth-title">欢迎回来</h1>
                <p class="auth-subtitle">登录你的账号继续使用</p>
                <div class="auth-fields">
                    <div class="field">
                        <input id="login-username" type="text" placeholder="用户名" autocomplete="username" spellcheck="false">
                    </div>
                    <div class="field">
                        <input id="login-password" type="password" placeholder="密码" autocomplete="current-password">
                    </div>
                </div>
                <div id="login-error" class="auth-error" hidden></div>
                <button id="login-btn" class="auth-btn" type="button">登 录</button>
                <p class="auth-switch">
                    还没有账号？<a href="#" id="switch-to-register">注册</a>
                </p>
            </div>

            <div id="register-form" class="auth-panel" hidden>
                <h1 class="auth-title">创建账号</h1>
                <p class="auth-subtitle">注册成为新用户</p>
                <div class="auth-fields">
                    <div class="field">
                        <input id="reg-username" type="text" placeholder="用户名" autocomplete="username" spellcheck="false">
                    </div>
                    <div class="field">
                        <input id="reg-display-name" type="text" placeholder="昵称（可选）" autocomplete="name" spellcheck="false">
                    </div>
                    <div class="field">
                        <input id="reg-password" type="password" placeholder="密码（至少8位）" autocomplete="new-password">
                    </div>
                    <div class="field">
                        <input id="reg-confirm-password" type="password" placeholder="确认密码" autocomplete="new-password">
                    </div>
                </div>
                <div id="reg-error" class="auth-error" hidden></div>
                <button id="register-btn" class="auth-btn" type="button">注 册</button>
                <p class="auth-switch">
                    已有账号？<a href="#" id="switch-to-login">登录</a>
                </p>
            </div>
        </div>
    </div>

    <script src="/static/pages/auth/script.js"></script>
</body>
</html>
