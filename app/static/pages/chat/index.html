<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Pool Chat</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/shared/base.css">
    <link rel="stylesheet" href="/static/pages/chat/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <span>AI Stream</span>
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                </div>

                <nav class="nav-menu" aria-label="主导航">
                    <button class="nav-item" id="new-chat-btn" type="button">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        新聊天
                    </button>
                    <button class="nav-item" type="button">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        搜索聊天
                    </button>
                    <a class="nav-item" href="/channels">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                        channels
                    </a>
                    <button class="nav-item" type="button">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <circle cx="12" cy="12" r="1"></circle>
                            <circle cx="19" cy="12" r="1"></circle>
                            <circle cx="5" cy="12" r="1"></circle>
                        </svg>
                        更多
                    </button>
                </nav>
            </div>

            <div class="history-list">
                <div class="history-section-title">最近</div>
            </div>

            <div class="sidebar-footer" id="user-menu">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <span class="user-name" id="user-name">用户</span>
                </div>
                <button id="logout-btn" class="logout-btn" type="button" title="退出登录">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </aside>

        <main class="chat-main" id="chat-main">
            <header class="chat-header">
                <button class="icon-btn" type="button" aria-label="扩展功能">✧</button>
            </header>

            <section class="welcome-screen" id="welcome-screen">
                <h1 class="welcome-title">What can I help with?</h1>
            </section>

            <section class="chat-container" id="chat-container" aria-live="polite"></section>

            <div class="status-indicator" id="status-indicator">
                <div class="typing-loader" aria-hidden="true">
                    <span></span><span></span><span></span>
                </div>
                <span>AI 正在生成...</span>
            </div>

            <form class="composer-shell" id="composer-form">
                <div class="input-wrapper">
                    <button class="action-btn add-btn" type="button" aria-label="添加">+</button>
                    <textarea id="message-input" placeholder="输入你想探讨的系统架构或代码逻辑..." rows="1"></textarea>

                    <div class="input-controls">
                        <div class="model-selector-wrapper" id="model-selector-wrapper">
                            <button id="model-selector-btn" class="model-selector-btn" type="button" aria-expanded="false">
                                <span id="model-selector-text">选择模型</span>
                                <svg class="model-arrow" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </button>
                            <div id="model-dropdown" class="model-dropdown" hidden role="listbox" aria-label="选择模型">
                                <div class="model-list" id="model-list" role="group"></div>
                            </div>
                        </div>
                        <button class="action-btn mic-btn" type="button" aria-label="语音">🎤</button>
                        <button id="send-btn" class="send-btn" type="submit" aria-label="发送">↑</button>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <script src="/static/pages/chat/script.js?v=2"></script>
</body>
</html>
