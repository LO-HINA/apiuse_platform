<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Pool Chat</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/pages/chat/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <span>AI Stream</span>
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                </div>

                <div class="nav-menu">
                    <div class="nav-item" id="new-chat-btn" role="button" tabindex="0" aria-label="新建聊天">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        新聊天
                    </div>
                    <div class="nav-item">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        搜索聊天
                    </div>
                    <div class="nav-item">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                        channels
                    </div>
                    <div class="nav-item">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="1"></circle>
                            <circle cx="19" cy="12" r="1"></circle>
                            <circle cx="5" cy="12" r="1"></circle>
                        </svg>
                        更多
                    </div>
                </div>
            </div>

            <div class="history-list">
                <div class="history-section-title">最近</div>
            </div>
        </aside>

        <!-- 主内容区：对话展示与输入 -->
        <main class="chat-main">
            <!-- 顶部右侧快捷按钮 (截图右上角的扩展功能) -->
            <header class="chat-header">
                <button class="icon-btn">✧</button>
            </header>

            <!-- 初始欢迎视口 -->
            <div class="welcome-screen" id="welcome-screen">
                <h1 class="welcome-title">What can I help with?</h1>

                <!-- 居中悬浮输入区 -->
                <div class="floating-input-area">
                    <!-- 文件/代码片段预览区 (对应截图里的 index, script, style) -->


                    <div class="input-wrapper">
                        <button class="action-btn add-btn">+</button>
                        <textarea id="message-input" placeholder="输入你想探讨的系统架构或代码逻辑..." rows="1"></textarea>

                        <div class="input-controls">
                            <span class="model-selector">Pro ⌄</span>
                            <button class="action-btn mic-btn">🎤</button>
                            <button id="send-btn" class="send-btn" type="button">↑</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 对话进行时的消息流区 (初始隐藏) -->
            <div class="chat-container" id="chat-container" style="display: none;">
                <!-- 消息动态插入到这里 -->
            </div>

            <!-- 这里可以保留你原来的 status-indicator -->
            <div class="status-indicator" id="status-indicator">
                <div class="typing-loader">
                    <span></span><span></span><span></span>
                </div>
                <span>AI 正在生成...</span>
            </div>
        </main>
    </div>

    <script src="/static/pages/chat/script.js"></script>
</body>
</html>
