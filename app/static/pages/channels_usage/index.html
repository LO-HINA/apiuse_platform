<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Pool - 用量管理</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/shared/base.css">
    <link rel="stylesheet" href="/static/shared/sidebar.css">
    <link rel="stylesheet" href="/static/pages/channels_usage/style.css">
</head>
<body>
    <script>(function(){if(!(localStorage.getItem('access_token')||localStorage.getItem('token')))window.location.href='/login'})();</script>
    <div class="app-container">
        <main class="usage-main">
            <header class="usage-header">
                <div>
                    <p class="eyebrow">API Pool</p>
                    <h1>用量管理</h1>
                </div>
                <div class="toolbar">
                    <button id="refresh-btn" class="ghost-btn" type="button">刷新</button>
                </div>
            </header>

            <section class="stats-grid">
                <article class="stat-card">
                    <div class="stat-icon total-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span>总请求数</span>
                        <strong id="stat-total">--</strong>
                    </div>
                </article>
                <article class="stat-card">
                    <div class="stat-icon today-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span>今日用量</span>
                        <strong id="stat-today">--</strong>
                    </div>
                </article>
                <article class="stat-card">
                    <div class="stat-icon month-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span>本月用量</span>
                        <strong id="stat-month">--</strong>
                    </div>
                </article>
            </section>

            <section class="panel chart-panel">
                <div class="table-head">
                    <div>
                        <h2>Token 花费趋势</h2>
                        <p id="chart-summary">最近 30 天每日 Token 总量</p>
                    </div>
                </div>
                <div class="chart-wrap">
                    <canvas id="usage-chart"></canvas>
                </div>
            </section>

            <section class="panel table-panel">
                <div class="table-head">
                    <div>
                        <h2>用量明细</h2>
                        <p id="table-summary">最近 30 天用量记录</p>
                    </div>
                    <div class="filter-group">
                        <select id="model-filter" class="filter-select">
                            <option value="">全部模型</option>
                        </select>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>模型</th>
                                <th>请求数</th>
                                <th>输入 Tokens</th>
                                <th>输出 Tokens</th>
                                <th>总计 Tokens</th>
                            </tr>
                        </thead>
                        <tbody id="usage-tbody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/shared/sidebar.js"></script>
    <script src="/static/pages/channels_usage/script.js"></script>
</body>
</html>
